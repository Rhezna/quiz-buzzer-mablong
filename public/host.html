<!DOCTYPE html>
<html>
<head>
  <title>Host</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="timer">30</h1>

<button onclick="startTimer()">Start 30s</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetBuzz()">Reset Buzz</button>
<button onclick="resetScore()">Reset Score</button>

<h2>Scoreboard</h2>
<div id="board"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const board = document.getElementById("board");

socket.emit("get-data");

socket.on("init", render);
socket.on("score-update", render);

// TIMER
socket.on("timer", (t)=>{
  document.getElementById("timer").innerText = t;
});

socket.on("timer-end", ()=>{
  document.getElementById("timer").innerText = "Waktu Habis";
});

// BUZZ RESULT
socket.on("buzz-result", (winner)=>{
  document.querySelectorAll(".player").forEach(el=>{
    el.style.background = (el.dataset.name === winner) ? "green" : "lightgray";
  });
});

// RENDER SCOREBOARD
function render(data){
  const players = data.players;
  board.innerHTML = "";

  Object.keys(players)
    .sort((a,b)=>players[b].score - players[a].score)
    .forEach(name=>{
      const div = document.createElement("div");
      div.className = "player";
      div.dataset.name = name;

      div.innerHTML = `
        ${name} : ${players[name].score}
        <button onclick="add('${name}',1)">+1</button>
        <button onclick="add('${name}',-1)">-1</button>
      `;

      board.appendChild(div);
    });
}

function add(name,val){
  socket.emit("score",{name,value:val});
}

function resetBuzz(){
  socket.emit("reset-buzz");
}

function resetScore(){
  socket.emit("reset-score");
}

function startTimer(){
  socket.emit("start-timer");
}

function stopTimer(){
  socket.emit("stop-timer");
}
</script>

</body>
</html>
